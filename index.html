<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Block Blast</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div id="app">

    <header id="header">
      <div class="score-box">
        <span class="score-label">SCORE</span>
        <span class="score-value" id="scoreDisplay">0</span>
      </div>
      <div class="logo">
        <span class="logo-block">B</span><span class="logo-lock">LOCK</span>
        <span class="logo-blast">BLAST</span>
      </div>
      <div class="score-box">
        <span class="score-label">BEST</span>
        <span class="score-value" id="bestDisplay">0</span>
      </div>
    </header>

    <div id="comboText"></div>

    <main id="boardWrapper">
      <div id="board"></div>
    </main>

    <section id="tray">
      <div class="piece-slot" id="slot0"></div>
      <div class="piece-slot" id="slot1"></div>
      <div class="piece-slot" id="slot2"></div>
    </section>

  </div>

  <div id="overlay" class="hidden">
    <div id="overlayCard">
      <div class="over-title">GAME OVER</div>
      <div class="over-scores">
        <div class="over-row">
          <span>Score</span>
          <span id="finalScore">0</span>
        </div>
        <div class="over-row best">
          <span>Best</span>
          <span id="finalBest">0</span>
        </div>
      </div>
      <button id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
